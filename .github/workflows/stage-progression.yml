name: Approval Stage Progression

on:
  issues:
    types: [edited]
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write
  statuses: write

jobs:
  check-stage-progression:
    name: Check and Advance Approval Stage
    runs-on: ubuntu-latest
    if: |
      github.event.issue.state == 'open' &&
      !contains(github.event.issue.labels.*.name, 'approved') &&
      (github.event_name == 'issues' || github.event.comment.user.login != 'github-actions[bot]') &&
      (
        contains(github.event.issue.labels.*.name, 'pending-assignee') ||
        contains(github.event.issue.labels.*.name, 'pending-leadership') ||
        contains(github.event.issue.labels.*.name, 'pending-architect') ||
        contains(github.event.issue.labels.*.name, 'pending-director')
      )

    steps:
      - name: Parse checklist and advance stage
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_APPROVAL_TOKEN }}
          script: |
            const body        = context.payload.issue.body || '';
            const issueNumber = context.payload.issue.number;
            const labels      = context.payload.issue.labels.map(l => l.name);

            const checked = (label) => new RegExp(`- \\[x\\].*${label}`, 'i').test(body);

            const s1 = checked('Team Reviewer');
            const s2 = checked('Tech Lead') && checked('Product Owner') && checked('Engineering Manager');
            const s3 = checked('Architect');
            const s4 = checked('Engineering Director');

            const removeLabel = async (name) => {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issueNumber, name
              }).catch(() => {});
            };

            const addLabel = async (name) => {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issueNumber, labels: [name]
              });
            };

            const comment = async (body) => {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issueNumber, body
              });
            };

            // Extract approver handles from issue body
            const extract = (pattern) => {
              const m = body.match(pattern);
              return m ? m[1] : '';
            };
            const tl   = extract(/\*\*Tech Lead\*\* (@\S+)/);
            const po   = extract(/\*\*Product Owner\*\* (@\S+)/);
            const em   = extract(/\*\*Engineering Manager\*\* (@\S+)/);
            const arch = extract(/\*\*Architect\*\* (@\S+)/);
            const dir  = extract(/\*\*Engineering Director\*\* (@\S+)/);

            // Extract PR URL
            const prMatch = body.match(/\*\*PR\*\* \| \[.+?\]\((.+?)\)/);
            const prUrl   = prMatch ? prMatch[1] : '';

            if (s1 && s2 && s3 && s4) {
              // All done
              await removeLabel('pending-director');
              await addLabel('approved');
              await comment(`🎉 **All approvals complete!**\n\nAll approvers have signed off. The PR is cleared for merge.\n\n➡️ ${prUrl}`);
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issueNumber, state: 'closed'
              });

              // Unblock PR
              const parts    = prUrl.replace('https://github.com/', '').split('/');
              const prOwner  = parts[0];
              const prRepo   = parts[1];
              const prNumber = parseInt(parts[3]);
              const pr = await github.rest.pulls.get({ owner: prOwner, repo: prRepo, pull_number: prNumber });
              await github.rest.repos.createCommitStatus({
                owner: prOwner, repo: prRepo, sha: pr.data.head.sha,
                state: 'success',
                description: 'All approvals complete — ready to merge',
                context: 'approval-process',
                target_url: `https://github.com/${context.repo.owner}/approvals/issues/${issueNumber}`
              });
              await github.rest.issues.createComment({
                owner: prOwner, repo: prRepo, issue_number: prNumber,
                body: `## ✅ Approval Process Complete\n\nAll required approvals collected. This PR is cleared for merge.\n\n📋 **Approval record:** https://github.com/${context.repo.owner}/approvals/issues/${issueNumber}`
              });

            } else if (s1 && s2 && s3 && labels.includes('pending-architect')) {
              await removeLabel('pending-architect');
              await addLabel('pending-director');
              await comment(`✅ **Stage 3 complete** — Architecture review approved.\n\n${dir} — your final sign-off is needed. Please check your box above.`);

            } else if (s1 && s2 && labels.includes('pending-leadership')) {
              await removeLabel('pending-leadership');
              await addLabel('pending-architect');
              await comment(`✅ **Stage 2 complete** — Leadership approvals done.\n\n${arch} — your architecture review is now needed. Please check your box above.`);

            } else if (s1 && labels.includes('pending-assignee')) {
              await removeLabel('pending-assignee');
              await addLabel('pending-leadership');
              await comment(`✅ **Stage 1 complete** — Team assignee review done.\n\n${tl} ${po} ${em} — your approvals are needed for Stage 2. All three must check their box above.`);
            }
