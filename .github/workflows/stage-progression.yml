name: Approval Stage Progression

on:
  issues:
    types: [edited]
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write
  statuses: write

jobs:
  check-stage-progression:
    name: Check and Advance Approval Stage
    runs-on: ubuntu-latest
    if: |
      github.event.issue.state == 'open' &&
      !contains(github.event.issue.labels.*.name, 'approved') &&
      (github.event_name == 'issues' || github.event.comment.user.login != 'github-actions[bot]') &&
      (
        contains(github.event.issue.labels.*.name, 'pending-assignee') ||
        contains(github.event.issue.labels.*.name, 'pending-leadership') ||
        contains(github.event.issue.labels.*.name, 'pending-architect') ||
        contains(github.event.issue.labels.*.name, 'pending-director')
      )

    steps:
      - name: Parse checklist and advance stage
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_APPROVAL_TOKEN }}
          script: |
            const body        = context.payload.issue.body || '';
            const issueNumber = context.payload.issue.number;
            const labels      = context.payload.issue.labels.map(l => l.name);

            // Check if ANY checkbox for a role is checked (any one can approve)
            const anyChecked = (role) => new RegExp(`- \\[x\\].*\\*\\*${role}\\*\\*`, 'i').test(body);

            const s1 = anyChecked('Team Reviewer');
            // Stage 2: need one from each role (Tech Lead, Product Owner, Eng Manager)
            const s2 = anyChecked('Tech Lead') && anyChecked('Product Owner') && anyChecked('Engineering Manager');
            const s3 = anyChecked('Architect');
            const s4 = anyChecked('Engineering Director');

            const removeLabel = async (name) => {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issueNumber, name
              }).catch(() => {});
            };

            const addLabel = async (name) => {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issueNumber, labels: [name]
              });
            };

            const comment = async (text) => {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issueNumber, body: text
              });
            };

            // Update issue body to add ✅ to a stage header
            const markStageComplete = async (stageNum, stageName) => {
              const currentBody = context.payload.issue.body || '';
              const pattern = new RegExp(`### Stage ${stageNum} — ${stageName}(?!.*✅)`, 'i');
              if (pattern.test(currentBody)) {
                const newBody = currentBody.replace(pattern, `### Stage ${stageNum} — ${stageName} ✅`);
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: newBody
                });
              }
            };

            // Extract ALL handles for a role from issue body
            const extractAll = (role) => {
              const regex = new RegExp(`\\*\\*${role}\\*\\* (@\\S+)`, 'gi');
              const matches = [...body.matchAll(regex)];
              return matches.map(m => m[1]).join(' ');
            };
            
            const teamLeads    = extractAll('Tech Lead');
            const prodOwners   = extractAll('Product Owner');
            const engManagers  = extractAll('Engineering Manager');
            const architects   = extractAll('Architect');
            const directors    = extractAll('Engineering Director');
            const leadership   = [teamLeads, prodOwners, engManagers].filter(Boolean).join(' ');

            // Extract PR URL and parse it
            const prMatch = body.match(/\*\*PR\*\* \| \[.+?\]\((.+?)\)/);
            const prUrl   = prMatch ? prMatch[1] : '';
            const prParts = prUrl.replace('https://github.com/', '').split('/');
            const prOwner  = prParts[0] || '';
            const prRepo   = prParts[1] || '';
            const prNumber = parseInt(prParts[3]) || 0;
            const approvalIssueUrl = `https://github.com/${context.repo.owner}/approvals/issues/${issueNumber}`;

            // Helper to comment on the PR
            const commentOnPR = async (text) => {
              if (prOwner && prRepo && prNumber) {
                await github.rest.issues.createComment({
                  owner: prOwner,
                  repo: prRepo,
                  issue_number: prNumber,
                  body: text
                });
              }
            };

            if (s1 && s2 && s3 && s4) {
              // All done - mark Stage 4 complete
              await markStageComplete(4, 'Director Sign-off');
              await removeLabel('pending-director');
              await addLabel('approved');
              await comment(`🎉 **All approvals complete!**\n\nAll approvers have signed off. The PR is cleared for merge.\n\n➡️ ${prUrl}`);
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issueNumber, state: 'closed'
              });

              // Unblock PR
              const pr = await github.rest.pulls.get({ owner: prOwner, repo: prRepo, pull_number: prNumber });
              await github.rest.repos.createCommitStatus({
                owner: prOwner, repo: prRepo, sha: pr.data.head.sha,
                state: 'success',
                description: 'All approvals complete — ready to merge',
                context: 'approval-process',
                target_url: approvalIssueUrl
              });
              await commentOnPR(`## ✅ Approval Process Complete\n\nAll required approvals collected. This PR is cleared for merge.\n\n📋 **Approval record:** ${approvalIssueUrl}`);

            } else if (s1 && s2 && s3 && labels.includes('pending-architect')) {
              await markStageComplete(3, 'Architecture Review');
              await removeLabel('pending-architect');
              await addLabel('pending-director');
              await comment(`✅ **Stage 3 complete** — Architecture review approved.\n\n${directors} — your final sign-off is needed. Please check your box above.`);
              await commentOnPR(`### 🔄 Approval Progress Update\n\n✅ **Stage 3 complete** — Architecture review approved.\n\n**Awaiting:** ${directors} (Director Sign-off)\n\n📋 [Track progress](${approvalIssueUrl})`);

            } else if (s1 && s2 && labels.includes('pending-leadership')) {
              await markStageComplete(2, 'Leadership Sign-off');
              await removeLabel('pending-leadership');
              await addLabel('pending-architect');
              await comment(`✅ **Stage 2 complete** — Leadership approvals done.\n\n${architects} — your architecture review is now needed. Please check your box above.`);
              await commentOnPR(`### 🔄 Approval Progress Update\n\n✅ **Stage 2 complete** — Leadership sign-off done.\n\n**Awaiting:** ${architects} (Architecture Review)\n\n📋 [Track progress](${approvalIssueUrl})`);

            } else if (s1 && labels.includes('pending-assignee')) {
              await markStageComplete(1, 'Team Review');
              await removeLabel('pending-assignee');
              await addLabel('pending-leadership');
              await comment(`✅ **Stage 1 complete** — Team assignee review done.\n\n${leadership} — your approvals are needed for Stage 2 (one from each role).`);
              await commentOnPR(`### 🔄 Approval Progress Update\n\n✅ **Stage 1 complete** — Team review done.\n\n**Awaiting:** ${leadership} (Leadership Sign-off - one from each role)\n\n📋 [Track progress](${approvalIssueUrl})`);
            }
